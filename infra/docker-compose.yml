# Local dev stack

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: novapay
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: ./apps/api
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db, redis]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./apps/api
    env_file: .env
    depends_on: [db, redis]
    command: celery -A app.workers.celery worker --loglevel=info

  web:
    build: ./apps/web
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pg_data:
  